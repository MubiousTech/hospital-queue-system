<header class="hospital-header">
  <div class="header-container">
    <div class="logo-section">
      <span class="logo-icon">🏥</span>
      <h1>{{ hospitalName }}</h1>
    </div>

    <nav class="nav-menu" *ngIf="currentUser">
      <a routerLink="/dashboard" routerLinkActive="active" class="nav-link">Dashboard</a>
      <a routerLink="/appointments" routerLinkActive="active" class="nav-link">Appointments </a>
      <a routerLink="/health-record" routerLinkActive="active" class="nav-link">Records</a>
      <a routerLink="/queue" routerLinkActive="active" class="nav-link">Queue</a>
      <a routerLink="/admin" routerLinkActive="active" class="nav-link" *ngIf="currentUser.role === `admin`">Admin</a>
    </nav>

    <div class="user-section" *ngIf="currentUser">
      <span class="user-greeting">{{ getGreeting() }}, {{ getUserName() }}</span>
      <button class="logout-btn" (click)="onLogout()">Logout</button>
    </div>

    <div class="user-section" *ngIf="!currentUser">
      <button class="logout-btn" routerLink="/login">Login</button>
    </div>
  </div>
</header>
