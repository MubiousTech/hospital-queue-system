<header class="hospital-header">
  <div class="header-container">
    <div class="logo-section">
      <span class="logo-icon">🏥</span>
      <h1>{{ hospitalName }}</h1>
    </div>

    <div class="header-actions" *ngIf="currentUser">
      <button
        class="menu-toggle"
        type="button"
        [attr.aria-expanded]="menuOpen"
        aria-controls="primary-navigation"
        aria-label="Toggle navigation"
        (click)="toggleMenu()"
      >
        <span class="hamburger-icon" [class.open]="menuOpen">
          <span></span>
          <span></span>
          <span></span>
        </span>
      </button>

      <nav
        id="primary-navigation"
        class="nav-menu"
        [class.open]="menuOpen"
        role="navigation"
        aria-label="Primary navigation"
      >
        <a routerLink="/dashboard" routerLinkActive="active" class="nav-link" (click)="closeMenu()"
          >Dashboard</a
        >
        <a
          routerLink="/appointments"
          routerLinkActive="active"
          class="nav-link"
          (click)="closeMenu()"
          >Appointments</a
        >
        <a
          routerLink="/health-record"
          routerLinkActive="active"
          class="nav-link"
          (click)="closeMenu()"
          >Records</a
        >
        <a routerLink="/queue" routerLinkActive="active" class="nav-link" (click)="closeMenu()"
          >Queue</a
        >
        <a
          routerLink="/admin"
          routerLinkActive="active"
          class="nav-link"
          *ngIf="currentUser.role === `admin`"
          (click)="closeMenu()"
          >Admin</a
        >
        <button
          type="button"
          class="nav-logout-btn"
          (click)="onLogoutAndClose()"
          aria-label="Logout"
        >
          Logout
        </button>
      </nav>
    </div>
  </div>
</header>
